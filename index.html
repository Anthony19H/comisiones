<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Calculadora de Comisiones</title>
    <link rel="stylesheet" href="ventas.css">
    <script src="ventas.js"></script>
    <script src="utilitarios.js"></script>
</head>
<body>

    <div class="contenedor">
        <h1>Calculadora de Comisiones</h1>

        <label>Salario Base:</label>
        <input type="number" id="txtSueldoBase" onblur="validarCampo('txtSueldoBase')">
        <span id="err-txtSueldoBase" class="msg-error"></span>

        <label>Número de ventas:</label>
        <input type="number" id="txtVentas" onblur="validarCampo('txtVentas')">
        <span id="err-txtVentas" class="msg-error"></span>

        <label>Precio del producto:</label>
        <input type="number" id="txtPrecio" onblur="validarCampo('txtPrecio')">
        <span id="err-txtPrecio" class="msg-error"></span>

        
        

        <button onclick="calcular()">Calcular Comisión</button>

        <div class="resultados-caja">
            <h2>Resultados</h2>
            <p>Salario Base: <span id="spSueldoBase"></span></p>
            <p>Comisión: <span id="spComision"></span></p>
            <hr>
            <p class="total-destacado">Total: <span id="spTotal"></span></p>
        </div>
    </div>

</body>
</html>
