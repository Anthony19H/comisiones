<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Calculadora de Comisiones</title>
    <link rel="stylesheet" href="ventas.css">
    <script src="ventas.js"></script>
    <script src="utilitarios.js"></script>
</head>
<body>

    <main class="contenedor">
        <h1>Calculadora de Comisiones</h1>

        <div class="campo">
            <label for="txtSueldoBase">Salario Base</label>
            <input type="number" id="txtSueldoBase" placeholder="Ej: 1200">
        </div>

        <div class="campo">
            <label for="txtVentas">Número de ventas</label>
            <input type="number" id="txtVentas" placeholder="0">
        </div>

        <div class="campo">
            <label for="txtPrecio">Precio del producto</label>
            <input type="number" id="txtPrecio" placeholder="0.00">
        </div>

        <button onclick="calcular()">Calcular Comisión</button>

        <section class="resultados">
            <h2>Resultados</h2>
            <div class="fila-resultado">
                <span>Salario Base:</span>
                <strong id="spSueldoBase">-</strong>
            </div>
            <div class="fila-resultado">
                <span>Comisión:</span>
                <strong id="spComision">-</strong>
            </div>
            <div class="fila-resultado total">
                <span>Total a recibir:</span>
                <strong id="spTotal">-</strong>
            </div>
        </section>
    </main>
    
</body>
</html>
